<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>La Guarida — Acceso</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    background: #0d1b2a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, sans-serif;
  }
  .card {
    background: #111f30;
    border: 1px solid #1e3a5f;
    border-radius: 16px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
  }
  .logo { font-size: 48px; margin-bottom: 12px; }
  h1 {
    font-size: 22px;
    font-weight: 800;
    background: linear-gradient(90deg, #e94560, #f5a623);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 6px;
  }
  p { color: #6b8cae; font-size: 13px; margin-bottom: 32px; }
  input {
    width: 100%;
    background: #0a1520;
    border: 1px solid #1e3a5f;
    border-radius: 10px;
    padding: 14px 16px;
    color: #e8edf4;
    font-size: 15px;
    text-align: center;
    letter-spacing: 3px;
    margin-bottom: 16px;
    transition: border-color .2s;
  }
  input:focus { outline: none; border-color: #e94560; }
  button {
    width: 100%;
    background: #e94560;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 14px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: background .2s;
  }
  button:hover { background: #c73652; }
  .error {
    color: #e94560;
    font-size: 13px;
    margin-top: 12px;
    min-height: 18px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">🔒</div>
  <h1>La Guarida</h1>
  <p>Ingresá la contraseña para acceder</p>
  <input type="password" id="pwd" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()"/>
  <button onclick="login()">Entrar</button>
  <div class="error" id="err"></div>
</div>
<script>
async function login() {
  const pwd = document.getElementById("pwd").value;
  const err = document.getElementById("err");
  err.textContent = "";
  const res = await fetch("/login", {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({password: pwd})
  });
  const data = await res.json();
  if(data.ok) window.location.href = "/";
  else err.textContent = "❌ " + (data.error || "Contraseña incorrecta");
}
</script>
</body>
</html>
